name: CI

on:
  push:
  pull_request:

jobs:
  test-dispatcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml==6.0.1 pytest --quiet

      - name: Run tests
        run: pytest dispatcher/tests/ -v

  test-octoshim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: octoshim/go.mod

      - name: Vet
        run: cd octoshim && go vet ./...

      - name: Test
        run: cd octoshim && go test ./... -v -count=1

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './entrypoint'
