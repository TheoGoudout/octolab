name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Define both image names in lowercase
      - name: Prepare Image Names
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          echo "SHIM_IMAGE=${REGISTRY}/${REPO_LOWER}/shim-runner" >> $GITHUB_ENV
          echo "DISPATCHER_IMAGE=${REGISTRY}/${REPO_LOWER}/dispatcher" >> $GITHUB_ENV

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. Build & Push Shim Runner (The Large Image) ---
      - name: Extract metadata for Shim
        id: meta-shim
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SHIM_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Shim Runner
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta-shim.outputs.tags }}
          labels: ${{ steps.meta-shim.outputs.labels }}
          cache-from: type=registry,ref=${{ env.SHIM_IMAGE }}:latest
          cache-to: type=inline

      # --- 2. Build & Push Dispatcher (The Slim Image) ---
      - name: Extract metadata for Dispatcher
        id: meta-dispatcher
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DISPATCHER_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Dispatcher
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dispatcher
          push: true
          tags: ${{ steps.meta-dispatcher.outputs.tags }}
          labels: ${{ steps.meta-dispatcher.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DISPATCHER_IMAGE }}:latest
          cache-to: type=inline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (branch)
        if: github.ref_type == 'branch'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.SHIM_IMAGE }}:${{ github.sha }}
            ${{ env.SHIM_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SHIM_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push (tag)
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.SHIM_IMAGE }}:${{ github.ref_name }}
            ${{ env.SHIM_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SHIM_IMAGE }}:latest
          cache-to: type=inline
