name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  # We move the logic for SHIM_IMAGE into a step because 
  # top-level env blocks don't support shell commands like lowercase.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # This step creates the lowercase version of your image name
      - name: Prepare Image Name
        run: |
          echo "SHIM_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/shim-runner" >> $GITHUB_ENV

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (branch)
        if: github.ref_type == 'branch'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.SHIM_IMAGE }}:${{ github.sha }}
            ${{ env.SHIM_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SHIM_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push (tag)
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.SHIM_IMAGE }}:${{ github.ref_name }}
            ${{ env.SHIM_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.SHIM_IMAGE }}:latest
          cache-to: type=inline
