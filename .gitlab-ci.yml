# Bridge project's own CI pipeline — builds and tests the bridge itself.

stages:
  - test
  - build
  - publish

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"
  REGISTRY: "registry.gitlab.com"
  SHIM_IMAGE: "${REGISTRY}/${CI_PROJECT_PATH}/shim-runner"
  DISPATCHER_IMAGE: "${REGISTRY}/${CI_PROJECT_PATH}/bridge-dispatcher"

# --------------------------------------------------------------------------- #
# Test
# --------------------------------------------------------------------------- #

test:dispatcher:
  stage: test
  image: python:3.11-slim
  script:
    - pip install pyyaml==6.0.1 pytest --quiet
    - pytest dispatcher/tests/ -v
  coverage: '/TOTAL.*\s(\d+%)$/'

test:octoshim:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd octoshim
    - go vet ./...
    - go test ./... -v -count=1

lint:shell:
  stage: test
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck entrypoint/bridge.sh entrypoint/mask-tokens.sh

# --------------------------------------------------------------------------- #
# Build
# --------------------------------------------------------------------------- #

build:shim-runner:
  stage: build
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build
        --target runtime
        --tag "${SHIM_IMAGE}:${CI_COMMIT_SHORT_SHA}"
        --tag "${SHIM_IMAGE}:latest"
        --cache-from "${SHIM_IMAGE}:latest"
        .
    - docker push "${SHIM_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${SHIM_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --------------------------------------------------------------------------- #
# Publish versioned tags
# --------------------------------------------------------------------------- #

publish:versioned-tag:
  stage: publish
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "${SHIM_IMAGE}:latest"
    - docker tag "${SHIM_IMAGE}:latest" "${SHIM_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${SHIM_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
